<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Password Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <nav>
        <a href="/" class="brand">Simulatore</a>
        <div class="links">
            <a href="/register.html">Registrati</a>
        </div>
    </nav>
    <div class="login-box">
        <h2>Bentornato</h2>
        <p>Accedi al tuo account</p>
        <form id="loginForm" class="form-group">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" style="margin-top: 1rem;">Accedi</button>
        </form>
        <div class="error-msg" id="loginError"></div>
    </div>
    <script type="module" src="/src/auth.js"></script>
</body>
</html>
